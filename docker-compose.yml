services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.13.0
    # No host port mapping: MLflow is internal to the compose network. Caddy is
    # the only host-facing service, and FastAPI reaches MLflow as http://mlflow:5000.
    # MLflow 3 rejects requests whose Host header is not on its DNS-rebinding
    # allowlist, which defaults to localhost only. FastAPI reaches the server as
    # http://mlflow:5000, so the service name must be allowlisted explicitly.
    # localhost stays on the list because the healthcheck probes localhost:5000.
    # Setting the env var replaces the default list, so both entries are required.
    environment:
      MLFLOW_SERVER_ALLOWED_HOSTS: "mlflow:5000,localhost:5000,127.0.0.1:5000"
    volumes:
      - ./mlflow.db:/mlflow/mlflow.db
      - ./mlruns:/mlflow/artifacts
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --artifacts-destination /mlflow/artifacts
      --serve-artifacts
    # The official MLflow image ships no curl, so the healthcheck uses the
    # Python interpreter already present in the image. urlopen exits non-zero
    # on any status other than 2xx, which is the signal Compose needs.
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request, sys; sys.exit(0) if urllib.request.urlopen("http://localhost:5000/health").status == 200 else sys.exit(1)
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  fastapi:
    build: .
    # No host port mapping: FastAPI is reached only through Caddy over the compose
    # network as http://fastapi:8000. Publishing it to the host would bypass ufw
    # (Docker writes its own iptables rules), leaving only the cloud firewall in
    # front of the port. Caddy terminates TLS and is the sole public surface.
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
    depends_on:
      mlflow:
        condition: service_healthy
    # python:3.12-slim ships no curl either; reuse the interpreter-based probe.
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request, sys; sys.exit(0) if urllib.request.urlopen("http://localhost:8000/health").status == 200 else sys.exit(1)
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    # The only service that publishes to the host. Caddy reverse-proxies to
    # fastapi over the compose network and provisions Let's Encrypt TLS for the
    # public hostname via the HTTP-01 challenge, which needs ports 80 and 443
    # reachable from the internet.
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Named volumes persist the issued certificates and Caddy's state across
      # restarts. Without them every restart re-runs ACME and risks hitting
      # Let's Encrypt rate limits.
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      fastapi:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
