name: CI

on:
  pull_request:
  push:
    branches: [main]

# A newer push to the same ref cancels in-flight runs, so a rapid series of
# commits on a PR only pays for the latest one.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: Lint, type-check, and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Create venv and install dependencies
        run: |
          uv venv .venv
          . .venv/bin/activate
          uv pip install -e ".[dev]"

      # pre-commit manages its own isolated hook environments; cache them so the
      # ruff and mypy hooks do not reinstall on every run.
      - name: Cache pre-commit environments
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: pre-commit (ruff, ruff-format, mypy)
        run: |
          . .venv/bin/activate
          pre-commit run --all-files

      - name: pytest
        run: |
          . .venv/bin/activate
          python -m pytest

  docker:
    name: Build image and smoke-test compose
    runs-on: ubuntu-latest
    needs: lint-test
    # Pin the project name so the built image is named deterministically and
    # docker compose reuses it instead of rebuilding from scratch.
    env:
      COMPOSE_PROJECT_NAME: hdb-mlops-platform
      FASTAPI_IMAGE: hdb-mlops-platform-fastapi:latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build once, with the GitHub Actions layer cache, and tag the result with
      # the exact name compose derives from the project + service name. The
      # later `docker compose up` (without --build) then reuses this image rather
      # than triggering a second, uncached build.
      - name: Build FastAPI image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.FASTAPI_IMAGE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # CI has no training data (data/ is gitignored, DVC needs MinIO) and the
      # real 8.4 MB champion is too large to commit, so the registry is seeded
      # with a tiny synthetic champion. The seed runs inside the built image so
      # the model is pickled with the exact scikit-learn version that will later
      # unpickle it in the serving container. The migration then rewrites the
      # stored artifact paths to mlflow-artifacts: proxy URIs so the
      # containerised tracking server can serve them — the same two-step flow
      # that produced the real champion. See
      # docs/adr/0007-ci-workflow-and-registry-strategy.md.
      - name: Seed synthetic champion into the registry
        run: |
          docker run --rm -v "$PWD":/work -w /work "$FASTAPI_IMAGE" \
            python scripts/seed_ci_registry.py
          docker run --rm -v "$PWD":/work -w /work "$FASTAPI_IMAGE" \
            python scripts/migrate_artifact_paths_to_proxy.py
          sqlite3 mlflow.db \
            "SELECT alias, version FROM registered_model_aliases WHERE name='hdb-predictor';"

      - name: Start the compose stack
        run: docker compose up -d

      # Both services declare healthchecks; FastAPI's only passes once the
      # champion has loaded, so waiting on it implicitly confirms the model load.
      # Polling the inspected health status is robust to the docker compose ps
      # JSON format, which is newline-delimited per service rather than a single
      # object.
      - name: Wait for services to become healthy
        run: |
          wait_healthy() {
            local svc=$1 tries=40 i cid health
            for i in $(seq 1 "$tries"); do
              cid=$(docker compose ps -q "$svc")
              health=$(docker inspect -f '{{.State.Health.Status}}' "$cid" 2>/dev/null || echo missing)
              echo "[$i/$tries] $svc: $health"
              [ "$health" = "healthy" ] && return 0
              sleep 3
            done
            echo "$svc did not become healthy in time" >&2
            return 1
          }
          wait_healthy mlflow
          wait_healthy fastapi

      - name: Integration smoke — /predict
        run: |
          response=$(curl -sf -X POST http://localhost:8000/predict \
            -H 'Content-Type: application/json' \
            -d '{"town":"TAMPINES","flat_type":"4 ROOM","floor_area_sqm":95.0,"lease_commence_date":1985,"month":"2024-06"}')
          echo "Response: $response"
          echo "$response" | grep -q '"predicted_resale_price"' || { echo "Missing predicted_resale_price"; exit 1; }
          echo "$response" | grep -q '"model_version"' || { echo "Missing model_version"; exit 1; }
          echo "$response" | grep -q '"model_alias":"champion"' || { echo "Missing champion alias"; exit 1; }
          echo "Smoke test passed: response shape is correct."

      - name: Tear down the compose stack
        if: always()
        run: docker compose down

      - name: Dump FastAPI logs on failure
        if: failure()
        run: docker compose logs fastapi || true

      - name: Dump MLflow logs on failure
        if: failure()
        run: docker compose logs mlflow || true
